<!DOCTYPE html>
<html>
<head>
  <title>SkillDex - Custom Image Objects</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #heroSection {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #heroSection canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }
    .hero-content {
      position: relative;
      color: #333;
      padding: 20px;
    }
    #featuresSection { height: 100vh; padding: 50px; background-color: #f4f4f4; }
  </style>
</head>
<body>

  <section id="heroSection">
    <div class="hero-content">
      <h1>SkillDex Project</h1>
      <p>Physics Animation with Custom Images</p>
    </div>
  </section>

  <section id="featuresSection">
    <h2>Features Section</h2>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    // --- กำหนด "พิมพ์เขียว" ---
    const imageBlueprints = [
      { src: 'assets/images/2.png', widthVw: 6, initialXPercent: 10, initialY: -600 },
      { src: 'assets/images/3.png', widthVw: 6, initialXPercent: 55, initialY: -700 },
      { src: 'assets/images/t4.png', widthVw: 34, initialXPercent: 40, initialY: -200, initialAngle: -0.1 },
      { src: 'assets/images/t3.png', widthVw: 36, initialXPercent: 80, initialY: -150, initialAngle: 0.1 },
      { src: 'assets/images/t2.png', widthVw: 38, initialXPercent: 20, initialY: -400, initialAngle: -0.2 },
      { src: 'assets/images/t1.png', widthVw: 50, initialXPercent: 60, initialY: -350, initialAngle: 0.2 },
      { src: 'assets/images/1.png', widthVw: 6, initialXPercent: 50, initialY: -500 },
    ];
    
    // --- โหลดรูปภาพ ---
    const loadedImages = {};
    let imagesLoadedCount = 0;
    imageBlueprints.forEach(bp => {
        const img = new Image();
        img.src = bp.src;
        img.onload = () => {
            loadedImages[bp.src] = { img: img, widthVw: bp.widthVw };
            imagesLoadedCount++;
            if (imagesLoadedCount === imageBlueprints.length) {
                initializeMatter();
            }
        };
    });

    function initializeMatter() {
        const heroSection = document.getElementById('heroSection');
        const { Engine, Render, Runner, World, Bodies, Body, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        engine.world.gravity.y = 0.5;

        const render = Render.create({
            element: heroSection,
            engine: engine,
            options: {
                width: heroSection.clientWidth,
                height: heroSection.clientHeight,
                wireframes: false,
                background: 'transparent',
                pixelRatio: window.devicePixelRatio || 1 
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        function vwToPx(vw) {
          return (vw / 100) * heroSection.clientWidth;
        }

        function populateWorld() {
            World.clear(world, false);
            
            const sectionWidth = heroSection.clientWidth;
            const sectionHeight = heroSection.clientHeight;

            const wallOptions = { isStatic: true, render: { visible: false } };
            World.add(world, [
                Bodies.rectangle(sectionWidth / 2, sectionHeight, sectionWidth, 60, wallOptions), // พื้น
                Bodies.rectangle(-30, sectionHeight / 2, 60, sectionHeight, wallOptions),
                Bodies.rectangle(sectionWidth + 30, sectionHeight / 2, 60, sectionHeight, wallOptions),
            ]);

            imageBlueprints.forEach((blueprint, index) => {
                setTimeout(() => {
                    const imageData = loadedImages[blueprint.src];
                    if (!imageData) return;

                    const x = (blueprint.initialXPercent / 100) * sectionWidth;
                    const y = blueprint.initialY;
                    
                    const imageAspectRatio = imageData.img.naturalHeight / imageData.img.naturalWidth;
                    const bodyWidth = vwToPx(imageData.widthVw);
                    const bodyHeight = bodyWidth * imageAspectRatio;

                    const body = Bodies.rectangle(x, y, bodyWidth, bodyHeight, {
                        angle: blueprint.initialAngle || 0,
                        restitution: 0.5,
                        friction: 0.1,
                        render: {
                            sprite: {
                                texture: imageData.img.src,
                                xScale: bodyWidth / imageData.img.naturalWidth,
                                yScale: bodyHeight / imageData.img.naturalHeight
                            }
                        }
                    });

                    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.05);
                    World.add(world, body);

                }, index * 1000); 
            });
        }

        populateWorld();

        // สร้าง Mouse Control
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });

        // เพิ่ม Mouse Control เข้าไปใน World
        World.add(world, mouseConstraint);
        render.mouse = mouse;

        let wheelTimeout;
        const canvasElement = heroSection.querySelector('canvas');

        // Event listener สำหรับ "wheel" event (การหมุน mouse wheel)
        window.addEventListener('wheel', () => {
            // เมื่อเริ่มหมุน mouse wheel ให้ปิดการโต้ตอบกับ canvas ทันที
            // เพื่อให้หน้าเว็บ scroll ได้
            if (canvasElement) {
                canvasElement.style.pointerEvents = 'none';
            }

            // เคลียร์ timeout เก่าทิ้ง (ถ้ามี)
            clearTimeout(wheelTimeout);

            // ตั้ง timeout ใหม่: ถ้าไม่มีการหมุน wheel อีกใน 250ms จะถือว่าหยุดแล้ว
            wheelTimeout = setTimeout(() => {
                // เมื่อหยุดหมุนแล้ว ให้เปิดการโต้ตอบกับ canvas อีกครั้ง
                // เพื่อให้กลับมาลาก object ได้
                if (canvasElement) {
                    canvasElement.style.pointerEvents = 'auto';
                }
            }, 250); // 250 milliseconds
        }, { passive: true }); // เพิ่ม passive: true เพื่อ performance ที่ดีขึ้น
        // --- จบส่วนโค้ดใหม่ ---


        // Event Listener สำหรับ Resize
        window.addEventListener('resize', () => {
            render.canvas.width = heroSection.clientWidth;
            render.canvas.height = heroSection.clientHeight;
            render.options.width = heroSection.clientWidth;
            render.options.height = heroSection.clientHeight;
            render.options.pixelRatio = window.devicePixelRatio || 1;
            populateWorld();
        });
    }
  </script>
</body>
</html>
